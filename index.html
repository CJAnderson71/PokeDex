<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/pokedex-favicon.svg?v=3" type="image/svg+xml" sizes="any" />
    <link rel="shortcut icon" href="/pokedex-favicon.svg?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanto Pokédex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap"
      rel="stylesheet"
    />
    <script>
      try {
        var t = localStorage.getItem('pokedex-theme')
        document.documentElement.dataset.theme =
          t === 'classic' ? 'classic' : 'arcade'
      } catch (e) {
        document.documentElement.dataset.theme = 'arcade'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
